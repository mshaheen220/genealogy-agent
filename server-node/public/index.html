<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gene E. - Genealogy Agent</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/images/favicon/apple-touch-icon.png">
  <link rel="shortcut icon" href="/images/favicon/favicon.ico">
  <link rel="manifest" href="/images/favicon/site.webmanifest">
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/scale.css" />
  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  <script src="/socket.io/socket.io.js"></script>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>

  <header class="app-header">
    <div class="header-left">
      <span class="header-logo"><img src="/images/logos/gene-e 350.png" alt="Gene E. - Genealogy Agent"></span>
      <div class="header-branding">
        <span class="brand-title">GENE E.</span>
        <span class="brand-subtitle">GENEALOGY AGENT</span>
      </div>
    </div>
    <div class="header-right">
      <div id="root-person">
        <div class="root-details">
          <span class="root-label">Family of</span>
          <span id="root-name">Loading...</span>
        </div>
      </div>
      <button id="cleanupBtn" class="header-btn icon-btn" data-tippy-content="Triage Dashboard">🧹</button>
    <button id="exportBtn" class="header-btn icon-btn" data-tippy-content="Export Chat Transcript">💾</button>
    </div>
  </header>

  <main class="app-container">
    
    <h1>🎙️ Live Genealogy Interview</h1>
        
    <div class="input-row">
      <input type="text" id="textInput" placeholder="Type a question about your family tree..." autocomplete="off" />
      <button id="sendBtn" aria-label="Ask question" data-tippy-content="Ask">✨</button>
    </div>

        <div class="controls-row">
      <label class="switch" data-tippy-content="Start Listening">
        <input type="checkbox" id="micToggleCheckbox">
        <span class="slider round"></span>
      </label>
      <span id="micToggleLabel">Microphone Off</span>
    </div>

    <div id="chat">
      <h2 class="chat-header">Conversation Log</h2>
    </div>
    
  </main>

  <div id="status">Ready...</div>

  <!-- Slide-out Triage Dashboard -->
  <div id="drawerOverlay" class="drawer-overlay"></div>
  <div id="cleanupDrawer" class="drawer">
    <div class="drawer-header">
      <h2>🧹 Triage Dashboard</h2>
      <button id="closeDrawerBtn" class="header-btn icon-btn" data-tippy-content="Close">✖</button>
    </div>
    <div id="cleanupList" class="drawer-content">
      <!-- Cleanup cards will be injected here -->
    </div>
  </div>

  <script>
  const socket = io();
  
  const micToggleCheckbox = document.getElementById("micToggleCheckbox");
  const micToggleLabel = document.getElementById("micToggleLabel");
  const status = document.getElementById("status");
  const chatDiv = document.getElementById("chat");
  const textInput = document.getElementById("textInput");
  const sendBtn = document.getElementById("sendBtn");
  const exportBtn = document.getElementById("exportBtn");
  const cleanupBtn = document.getElementById("cleanupBtn");
  const closeDrawerBtn = document.getElementById("closeDrawerBtn");
  const cleanupDrawer = document.getElementById("cleanupDrawer");
  const drawerOverlay = document.getElementById("drawerOverlay");
  const cleanupList = document.getElementById("cleanupList");

  // Initialize tooltips for static UI elements
  tippy('[data-tippy-content]', { animation: 'scale' });

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = false; 
  let isListening = false;

  function submitQuestion(text) {
    if (text) {
      socket.emit("transcription", text);
      status.innerText = `Processing...`;
      
      const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const pairId = 'pair-' + Date.now();
      const pairHTML = `
        <div class="conversation-pair" id="${pairId}" data-timestamp="${timestamp}">
          <div class="msg user-msg"><span class="user" data-tippy-content="${timestamp}">You:</span> ${text}</div>
          <div class="msg ai-loading"><span class="ai" data-tippy-content="Processing...">Agent:</span> <em>Thinking...</em></div>
        </div>
      `;
      
      chatDiv.insertAdjacentHTML('beforeend', pairHTML);
      chatDiv.scrollTop = chatDiv.scrollHeight;
      tippy(`#${pairId} [data-tippy-content]`, { animation: 'scale' });
    }
  }

  recognition.onresult = (event) => {
    const transcript = event.results[event.results.length - 1][0].transcript.trim();
    if (transcript) {
      submitQuestion(transcript);
      status.innerText = `🔴 Listening...`;
    }
  };

  recognition.onend = () => {
    isListening = false;
    micToggleCheckbox.checked = false;
    micToggleLabel.innerText = "Microphone Off";
    if (micToggleCheckbox.parentElement._tippy) micToggleCheckbox.parentElement._tippy.setContent("Start Listening");
    status.innerText = "Stopped.";
  };

  sendBtn.addEventListener("click", () => {
    const text = textInput.value.trim();
    if (text) {
      submitQuestion(text);
      textInput.value = "";
    }
  });

  textInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
      const text = textInput.value.trim();
      if (text) {
        submitQuestion(text);
        textInput.value = "";
      }
    }
  });

  socket.on("answer", (answer) => {
    // Locate the very last thinking message in the DOM
    const loadingMsgs = document.getElementsByClassName("ai-loading");
    const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    
    if (loadingMsgs.length > 0) {
      const lastLoadingMsg = loadingMsgs[loadingMsgs.length - 1];
      lastLoadingMsg.innerHTML = `<span class="ai" data-tippy-content="${timestamp}">Agent:</span> ${answer}`;
      lastLoadingMsg.classList.remove("ai-loading");
      tippy(lastLoadingMsg.querySelector('.ai'), { animation: 'scale' });
    } else {
      // Fallback: If no loader is found, wrap it safely in a pair container
      const fallbackId = 'pair-fb-' + Date.now();
      const fallbackHTML = `
        <div class="conversation-pair" id="${fallbackId}" data-timestamp="${timestamp}">
          <div class="msg"><span class="ai" data-tippy-content="${timestamp}">Agent:</span> ${answer}</div>
        </div>
      `;
      chatDiv.insertAdjacentHTML('beforeend', fallbackHTML);
      tippy(`#${fallbackId} [data-tippy-content]`, { animation: 'scale' });
    }
    chatDiv.scrollTop = chatDiv.scrollHeight;

    // Reset the status indicator after processing finishes
    if (isListening) {
      status.innerText = "🔴 Listening...";
    } else {
      status.innerText = "Ready...";
    }
  });

  socket.on("root-info", (data) => {
    document.getElementById("root-name").innerText = data.name;
    document.getElementById("root-name").setAttribute("data-id", data.id);
  });

  micToggleCheckbox.addEventListener("change", (e) => {
    if (e.target.checked) {
      try {
        recognition.start();
        isListening = true;
        micToggleLabel.innerText = "Microphone On";
        status.innerText = "🔴 Listening and streaming...";
        if (micToggleCheckbox.parentElement._tippy) micToggleCheckbox.parentElement._tippy.setContent("Stop Listening");
      } catch (err) {
        console.error("Error accessing microphone:", err);
        status.innerText = "Error accessing microphone. Check browser permissions.";
        micToggleCheckbox.checked = false;
        if (micToggleCheckbox.parentElement._tippy) micToggleCheckbox.parentElement._tippy.setContent("Start Listening");
      }
    } else {
      recognition.stop();
      if (micToggleCheckbox.parentElement._tippy) micToggleCheckbox.parentElement._tippy.setContent("Start Listening");
    }
  });

  exportBtn.addEventListener("click", () => {
    const pairs = document.querySelectorAll(".conversation-pair");
    if (pairs.length === 0) {
      alert("The conversation is empty. Ask a question first!");
      return;
    }

    const rootName = document.getElementById("root-name").innerText;
    const rootId = document.getElementById("root-name").getAttribute("data-id") || "Unknown ID";
    const currentDate = new Date().toLocaleDateString();

    let transcript = "Gene E. - Genealogy Agent Transcript\n";
    transcript += `Date: ${currentDate}\n`;
    transcript += `Tree Subject: ${rootName} (${rootId})\n`;
    transcript += "====================================\n\n";

    pairs.forEach(pair => {
      const userMsg = pair.querySelector(".user-msg");
      const aiMsg = pair.querySelector(".msg:not(.user-msg)");
      const timestamp = pair.getAttribute("data-timestamp") || new Date().toLocaleTimeString();
      
      transcript += `[${timestamp}]\n`;
      if (userMsg) transcript += userMsg.innerText + "\n\n";
      if (aiMsg) transcript += aiMsg.innerText + "\n\n";
      transcript += "------------------------------------\n\n";
    });

    const blob = new Blob([transcript], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const dateStr = new Date().toISOString().slice(0, 10);
    a.download = `Genealogy_Transcript_${dateStr}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  // Drawer Logic
  function toggleDrawer(show) {
    if (show) {
      cleanupDrawer.classList.add("open");
      drawerOverlay.classList.add("open");
      socket.emit("get-cleanups"); // Fetch latest data
    } else {
      cleanupDrawer.classList.remove("open");
      drawerOverlay.classList.remove("open");
    }
  }

  cleanupBtn.addEventListener("click", () => toggleDrawer(true));
  closeDrawerBtn.addEventListener("click", () => toggleDrawer(false));
  drawerOverlay.addEventListener("click", () => toggleDrawer(false));

  socket.on("cleanups-data", (data) => {
    cleanupList.innerHTML = "";
    if (data.length === 0) {
      cleanupList.innerHTML = "<p style='color: var(--text-muted); text-align: center; margin-top: 20px;'>No pending cleanups! 🎉</p>";
      return;
    }
    data.forEach(item => {
      const date = new Date(item.timestamp).toLocaleString();
      const isCompleted = item.completed === 1;
      const btnIcon = isCompleted ? '↩️' : '✅';
      const btnTip = isCompleted ? 'Mark as Pending' : 'Mark as Done';
      
      const div = document.createElement("div");
      div.className = `cleanup-card ${isCompleted ? 'completed' : ''}`;
      div.innerHTML = `
        <div class="cleanup-card-header">
          <span class="cleanup-date">${date}</span>
          <button class="header-btn icon-btn" onclick="socket.emit('toggle-cleanup', { id: ${item.id}, completed: ${isCompleted ? 0 : 1} })" data-tippy-content="${btnTip}" style="padding: 4px; font-size: 0.8rem; border-color: transparent; background: transparent;">${btnIcon}</button>
        </div>
        <div class="cleanup-card-text">${item.suggestion}</div>
      `;
      cleanupList.appendChild(div);
    });
    tippy('#cleanupList [data-tippy-content]', { animation: 'scale' });
  });
</script>
</body>
</html>
