<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genealogy Agent</title>
  <script src="/socket.io/socket.io.js"></script>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>

  <header class="app-header">
    <div class="header-left">
      <span class="header-logo">🎙️</span>
      <div class="header-branding">
        <span class="brand-title">GENEALOGY</span>
        <span class="brand-subtitle">VOICE INSIGHTS</span>
      </div>
    </div>
    <div class="header-right"></div>
  </header>

  <main class="app-container">
    
    <h1>🎙️ Live Genealogy Interview</h1>
    
    <div class="controls-row">
      <button id="startBtn">Start Listening</button>
      <button id="stopBtn" disabled>Stop Listening</button>
    </div>
    
    <div id="status">Ready...</div>
    <div id="chat">
      <h2 class="chat-header">Conversation Log</h2>
    </div>
    
  </main>

  <script>
  const socket = io();
  
  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const status = document.getElementById("status");
  const chatDiv = document.getElementById("chat");

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = false; 

  recognition.onresult = (event) => {
    const transcript = event.results[event.results.length - 1][0].transcript.trim();
    if (transcript) {
      socket.emit("transcription", transcript);
      status.innerText = `🔴 Listening...`;
      
      // 1. Create a fresh conversation pair element
      const pairId = 'pair-' + Date.now();
      const pairHTML = `
        <div class="conversation-pair" id="${pairId}">
          <div class="msg user-msg"><span class="user">You:</span> ${transcript}</div>
          <div class="msg ai-loading"><span class="ai">Agent:</span> <em>Thinking...</em></div>
        </div>
      `;
      
      // 2. Append it cleanly without touching the "Conversation Log" header text
      chatDiv.insertAdjacentHTML('beforeend', pairHTML);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }
  };

  socket.on("answer", (answer) => {
    // Locate the very last thinking message in the DOM
    const loadingMsgs = document.getElementsByClassName("ai-loading");
    if (loadingMsgs.length > 0) {
      const lastLoadingMsg = loadingMsgs[loadingMsgs.length - 1];
      lastLoadingMsg.innerHTML = `<span class="ai">Agent:</span> ${answer}`;
      lastLoadingMsg.classList.remove("ai-loading");
    } else {
      // Fallback: If no loader is found, wrap it safely in a pair container
      const fallbackHTML = `
        <div class="conversation-pair">
          <div class="msg"><span class="ai">Agent:</span> ${answer}</div>
        </div>
      `;
      chatDiv.insertAdjacentHTML('beforeend', fallbackHTML);
    }
    chatDiv.scrollTop = chatDiv.scrollHeight;
  });

  startBtn.addEventListener("click", async () => {
    try {
      recognition.start();
      startBtn.disabled = true;
      stopBtn.disabled = false;
      status.innerText = "🔴 Listening and streaming...";
    } catch (err) {
      console.error("Error accessing microphone:", err);
      status.innerText = "Error accessing microphone. Check browser permissions.";
    }
  });

  stopBtn.addEventListener("click", () => {
    recognition.stop();
    startBtn.disabled = false;
    stopBtn.disabled = true;
    status.innerText = "Stopped.";
  });
</script>
</body>
</html>
